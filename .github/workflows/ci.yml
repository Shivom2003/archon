name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Run ruff check
        run: ruff check archon/ tests/

      - name: Run ruff format check
        run: ruff format --check archon/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Only run the full OS matrix on the latest Python to save CI minutes.
        # Older versions only run on ubuntu.
        exclude:
          - python-version: "3.11"
            os: windows-latest
          - python-version: "3.11"
            os: macos-latest
          - python-version: "3.12"
            os: windows-latest
          - python-version: "3.12"
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # Quick sanity check that the package builds cleanly
  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Build
        run: hatch build

      - name: Check wheel contents include templates
        run: |
          python - <<'EOF'
          import zipfile, sys
          wheels = list(__import__('pathlib').Path('dist').glob('*.whl'))
          assert wheels, "No wheel found in dist/"
          whl = zipfile.ZipFile(wheels[0])
          names = whl.namelist()
          templates = [n for n in names if n.endswith('.j2')]
          if not templates:
              print("ERROR: No .j2 templates found in wheel!")
              for n in names:
                  print(" ", n)
              sys.exit(1)
          print(f"OK: {len(templates)} templates in wheel:")
          for t in templates:
              print(f"  {t}")
          EOF

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
