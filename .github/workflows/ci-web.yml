name: CI — Web

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/web/**"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check-and-build:
    name: Type-check + production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web

    env:
      # Placeholder values — build must succeed without real keys
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run lint
